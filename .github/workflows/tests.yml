name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install clang and route cc through it
        # Quartz / glassc try `cc` with -fbracket-depth=100000 (a Clang-only flag
        # that raises the nesting limit for the deeply-nested C they emit) and
        # FALL BACK without it when cc rejects it — so GCC works too (its default
        # nesting limit is higher). Clang is installed here only to also exercise
        # the with-flag path; it is no longer required (GCC is supported).
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang 100
          cc --version

      - name: Install Glass
        run: pip install -e .

      - name: Run regression suite
        run: python tests/test_glass.py

      - name: Run the self-host capstone
        run: glass examples/selfhost/prism.glass | tail -5

      - name: Run showcase examples
        run: |
          glass examples/showcase/derive.glass | grep -E "⟶" | head
          glass examples/showcase/prover.glass | grep -E "⟶" | head
          glass examples/showcase/nash.glass | grep -E "Nash equilibria" | head
